# Build, Push, and Deploy Docker image to Render with environment variables updated
# Some steps uses the example in "Publishing images to GitHub Packages" in GitHub Docs: https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
#
# Image is being built in a workflow within GitHub Actions, instead of Render, because Render is very slow at building Docker images.
name: test-build-push-deploy

# Configures this workflow to run every time a change is pushed to the branch called `main` and on workflow_dispatch (triggered manually).
on:
  workflow_dispatch:
  push:
    branches: ["main"]

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  test-build-push-deploy:
    runs-on: ubuntu-latest

    # TODO: Fix environments to allow different environments working correctly (ex. an environment for each branch, type of branches, etc.)
    # environment: ${{ github.ref_name }} # Not correctly working
    # environment: misc/workflows # Temporarily hard coded during testing
    environment: main # Use the main environment 

    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # # Set up Temurin JDK 17 for Maven tests
      # - name: Set up Temurin JDK 17
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: 'temurin'
      #     java-version: '17'
      #     cache: 'maven'
      
      # # Run Maven tests
      # - name: Run Maven tests
      #   run: mvn test

      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see [Usage](https://github.com/docker/build-push-action#usage) in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Sync Render environment variables from a single JSON secret to support any number of environment variables.
      #
      # This is optional; if $RENDER_SERVICE_ID and/or $RENDER_API_KEY is missing, this step and next step is skipped.
      # If $RENDER_ENV_VARS_JSON is empty, only this step is skipped.
      #
      # Value for $RENDER_ENV_VARS_JSON can be generated using output from env-to-json.sh
      #
      # This step was primarily written by GitHub Copilot.
      - name: Sync environment variables with Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_ENV_VARS_JSON: ${{ secrets.RENDER_ENV_VARS_JSON }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ]; then 
            echo "::warning title=Variables::RENDER_SERVICE_ID is missing."
          fi

          if [ -z "$RENDER_API_KEY" ]; then 
            echo "::warning title=Variables::RENDER_API_KEY is missing."
          fi

          if [ -z "$RENDER_ENV_VARS_JSON" ]; then
            echo "::warning title=Variables::RENDER_ENV_VARS_JSON is missing."
          fi

          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_ENV_VARS_JSON" ]; then
            echo "::warning title=Deployment::Syncing environment variables with Render was skipped because variables are missing."
            exit 0
          fi

          echo "$RENDER_ENV_VARS_JSON" | jq -rc 'to_entries[] | @base64' | while IFS= read -r row; do
            entry=$(echo "$row" | base64 --decode)
            key=$(echo "$entry" | jq -r '.key')
            value=$(echo "$entry" | jq -r '.value')
            echo "::add-mask::$value"

            payload=$(jq -n --arg value "$value" '{value: $value}')

            curl --fail --show-error --silent -X PUT \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars/${key}" \
              --header 'accept: application/json' \
              --header 'content-type: application/json' \
              --header "authorization: Bearer ${RENDER_API_KEY}" \
              --data "$payload" \
              --output /dev/null
          done

      # This step triggers a deployment to Render with the pre-built Docker image link.
      # 
      # Variable warning are not displayed again because last step displays them. The warning will be identical.
      # Skip warning is still shown from this step.
      #
      # Deployment status also verified to be "live" before confirming successful deployment.
      # Deployment status is checked every 15 seconds for 10 minutes.
      #
      # Debugging this step was assisted by GitHub Copilot.
      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          IMAGE_URL: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "::warning title=Deployment::Deployment to Render was skipped because variables are missing."
            exit 0
          fi

          response=$(curl --fail --show-error --silent -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header "authorization: Bearer ${RENDER_API_KEY}" \
            --data "{
              \"clearCache\": \"clear\",
              \"imageUrl\": \"${IMAGE_URL}\"
            }")
          
          echo "$response"

          RENDER_DEPLOY_ID=$(echo "$response" | jq -r '.id')

          for i in $(seq 1 40);
          do
            RENDER_STATUS_RESPONSE=$(curl --fail --show-error --silent -X GET \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${RENDER_DEPLOY_ID}" \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header "authorization: Bearer ${RENDER_API_KEY}")

            CURRENT_RENDER_DEPLOY_STATUS=$(echo "$RENDER_STATUS_RESPONSE" | jq -r '.status')
            echo "Current status: $CURRENT_RENDER_DEPLOY_STATUS"

            case "$CURRENT_RENDER_DEPLOY_STATUS" in 
              "live")
                echo "::notice title=Deployment::Render deployment succeeded."
                exit 0 
                ;;

              "deactivated" | "build_failed" | "update_failed" | "canceled" | "pre_deploy_failed")
                echo "::error title=Deployment::Deployment to Render failed."
                exit 1
                ;;
            esac

            sleep 15

          done

          echo "::error title=Deployment::Render deployment timed out waiting for success."
          exit 1
