<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Odyssey - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/auth/auth-styles.css">
</head>

<body class="text-light min-vh-100 mt-5 overflow-hidden">
    <header class="container">
        <h1 class="display-4 fw-bold text-light mb-3" id="title">MEDIA ODYSSEY</h1>
        <p class="lead fw-bold text-light mb-1" id="subtitle">Discover your next obsession!</p>
        <p class="lead fw-bold text-light mb-4" id="subtitle">Your journey starts here!</p>
    </header>
    <main class="container d-flex align-items-center justify-content-center py-3">
        <section class="card auth-card border-0 shadow-lg w-50">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center text-light fw-bold" id="welcome-text">Welcome back, adventurer!</h3>
                <form id="loginForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <input type="email" class="form-control form-control-lg bg-light text-dark border-secondary"
                            id="email" name="email" autocomplete="email" required placeholder="example@email.com">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control form-control-lg bg-light text-dark border-secondary"
                            id="password" name="password" autocomplete="current-password" required
                            placeholder="Password">
                    </div>

                    <div class="row g-2">
                        <div class="col-6 d-grid gap-2">
                            <button type="submit" class="btn btn-lg fw-semibold text-white" id="button">Log In
                            </button>
                        </div>
                        <div class="col-6 d-grid gap-2">
                            <a href="/auth/signup" class="btn btn-lg fw-semibold text-white" id="button">Create
                                account</a>
                        </div>
                        <div class="col-6 d-grid gap-2"></div>
                        <div class="col-6 d-grid gap-2">
                            <a href="/auth/resend" class="text-white text-decoration-none">Resend verification</a>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Bootstrap status modal -->
    <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="statusModalLabel">Media Odyssey</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body" id="statusModalBody"></div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-info text-dark fw-semibold" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const statusModalEl = document.getElementById("statusModal");
            const statusModalBody = document.getElementById("statusModalBody");
            const statusModal = new bootstrap.Modal(statusModalEl);

            let redirectAfterClose = null;

            function showStatusModal(message, redirectUrl = null) {
                statusModalBody.textContent = message;
                redirectAfterClose = redirectUrl;
                statusModal.show();
            }

            statusModalEl.addEventListener("hidden.bs.modal", () => {
                if (redirectAfterClose) window.location.href = redirectAfterClose;
            });

            document.getElementById("loginForm").addEventListener("submit", async (e) => {
                e.preventDefault();
                try {
                    const email = document.getElementById("email").value.trim();
                    const password = document.getElementById("password").value;

                    const payload = {
                        email: email,
                        password: password
                    };

                    const res = await fetch("/api/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        credentials: "include",
                        body: JSON.stringify(payload)
                    });

                    const resText = await res.json();

                    // If successful, responds with "OK". Otherwise, attempts default behavior of redirecting (failed).
                    if (resText.status === "AUTH_LOGIN_SUCCESS") {
                        // If successful login, tell the User. Also automatically redirect shortly. User can choose to skip the delay by closing pop up.
                        showStatusModal("Login successful.", "/");
                        setTimeout(() => window.location.replace("/"), 500);
                    } else if (resText.status === "AUTH_INVALID_CREDENTIALS" || "AUTH_USER_NOT_FOUND") {
                        showStatusModal("The email and/or password provided is incorrect. Please try again.");
                    } else if (resText.status === "AUTH_DISABLED") {
                        showStatusModal("You have not completed email verification for your account. Please check your email and follow the link.");
                    } else if (resText.status === "AUTH_LOCKED") {
                        showStatusModal("Your account is locked. Please contact support.");
                    } else if (resText.status === "AUTH_USER_NOT_FOUND") {
                        showStatusModal("The email and/or password provided is incorrect. Please try again or create an account.");
                    } else if (resText.status === "AUTH_BAD_REQUEST") {
                        showStatusModal("There was a problem with the input submitted. Please try again.");
                    } else {
                        showStatusModal("An unexpected error occurred. Please try again later.");
                    }

                } catch (error) {
                    showStatusModal("An unexpected error occurred. Please try again later.");
                }
            });
        });
    </script>
</body>

</html>
