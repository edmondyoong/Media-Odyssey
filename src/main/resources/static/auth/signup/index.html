<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Odyssey - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/auth/auth-styles.css">
</head>

<body class="bg-black text-white">
    <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <section class="card auth-card border-0 shadow-lg w-100" style="max-width: 520px;">
            <div class="card-body p-4 p-md-5">
                <header class="text-center mb-4">
                    <h1 class="h3 fw-bold text-white mb-2 mo-brand">MEDIA ODYSSEY</h1>
                    <p class="text-white-50 mb-0">Create your account</p>
                </header>

                <form id="signupForm" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label text-white">Email address</label>
                        <input type="email" class="form-control form-control-lg bg-black text-white border-secondary"
                            id="email" name="email" autocomplete="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-white">Password</label>
                        <input type="password" class="form-control form-control-lg bg-black text-white border-secondary"
                            id="password" name="password" autocomplete="new-password" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label text-white">Confirm Password</label>
                        <input type="password" class="form-control form-control-lg bg-black text-white border-secondary"
                            id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-info btn-lg fw-semibold text-dark">Sign Up</button>
                        <a href="/auth/login" class="btn btn-outline-light">Already have an account? Log In</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Bootstrap status modal -->
    <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="statusModalLabel">Media Odyssey</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body" id="statusModalBody"></div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-info text-dark fw-semibold" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const statusModalEl = document.getElementById("statusModal");
            const statusModalBody = document.getElementById("statusModalBody");
            const statusModal = new bootstrap.Modal(statusModalEl);

            let redirectAfterClose = null;

            function showStatusModal(message, redirectUrl = null) {
                statusModalBody.textContent = message;
                redirectAfterClose = redirectUrl;
                statusModal.show();
            }

            statusModalEl.addEventListener("hidden.bs.modal", () => {
                if (redirectAfterClose) window.location.href = redirectAfterClose;
            });

            document.getElementById("signupForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                try {

                    const email = document.getElementById("email").value.trim();
                    const password = document.getElementById("password").value;
                    const confirmPassword = document.getElementById("confirmPassword").value;

                    if (password !== confirmPassword) {
                        showStatusModal("Passwords do not match.");
                        return;
                    }

                    const payload = {
                        email: email,
                        password: password
                    };

                    const res = await fetch("/api/auth/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        credentials: "include",
                        body: JSON.stringify(payload)
                    });

                    const resText = await res.text();

                    // If successful, responds with "OK". Otherwise, attempts default behavior of redirecting (failed).
                    if (resText === "OK") {
                        // If successful signup, tell the User. Do not automatically redirect. User needs to be informed to check their email. User can choose to be redirected by closing pop up.
                        showStatusModal("Account created successfully. Please check your email to verify your account.", "/auth/login");
                    }
                    else {
                        showStatusModal("Registration failed");
                    }
                } catch (error) {
                    showStatusModal("Registration failed");
                }
            });
        });
    </script>
</body>

</html>
