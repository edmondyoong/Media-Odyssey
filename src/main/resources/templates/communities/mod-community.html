<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Community Moderation</title>

    <style>

        .container{
            width:70%;
            margin:auto;
            font-family: Arial;
        }

        .section{
            margin-top:30px;
        }

        .scroll-box{
            height:250px;
            overflow-y:auto;
            border:1px solid #ccc;
            padding:10px;
        }

        .member-row{
            display:flex;
            justify-content:space-between;
            padding:6px;
            border-bottom:1px solid #eee;
        }

        .actions form{
            display:inline;
        }

        h2,h3{
            margin-top:25px;
        }

        input[type="text"]{
            padding:6px;
        }

        select{
            padding:6px;
        }

        button{
            padding:4px 8px;
            margin-left:5px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Moderation Panel</h2>


    <form method="get" th:action="@{/communities/mod-community}">

        <select name="communityId">

            <option value="">Select Community</option>

            <option th:each="community : ${communities}"
                    th:value="${community.communityId}"
                    th:text="${community.communityName}"
                    th:selected="${community.communityId == communityId}">
            </option>

        </select>

        <button type="submit">Open</button>

    </form>


    <!-- SEARCH BAR -->

    <div class="section" th:if="${communityId != null}">

        <form method="get" th:action="@{/communities/mod-community}">

            <input type="hidden" name="communityId" th:value="${communityId}">

            <input type="text"
                   name="search"
                   placeholder="Search username..."
                   th:value="${search}">

            <button type="submit">Search</button>

        </form>

    </div>


    <!-- MEMBERS LIST -->

    <div class="section" th:if="${members != null}">

        <h3>Members</h3>

        <div class="scroll-box">

            <div class="member-row"
                 th:each="member : ${members}"
                 th:if="${member.roleType.toString() == 'MEMBER'}">

                <span th:text="${member.username}"></span>

                <div class="actions">

                    <form method="post" th:action="@{/communities/{communityId}/promote(communityId=${communityId})}">
                        <input type="hidden" name="targetUserId" th:value="${member.userId}">
                        <button type="submit">Promote</button>
                    </form>

                    <form method="post" th:action="@{/communities/{communityId}/kick(communityId=${communityId})}">
                        <input type="hidden" name="targetUserId" th:value="${member.userId}">
                        <button type="submit">Kick</button>
                    </form>

                    <form method="post" th:action="@{/communities/{communityId}/transfer(communityId=${communityId})}">
                        <input type="hidden" name="targetUserId" th:value="${member.userId}">
                        <button type="submit">Transfer</button>
                    </form>

                </div>

            </div>

        </div>

    </div>


    <!-- MODERATORS -->

    <div class="section" th:if="${members != null}">

        <h3>Moderators</h3>

        <div class="scroll-box">

            <div class="member-row"
                 th:each="member : ${members}"
                 th:if="${member.roleType.toString() == 'MODERATOR'}">

                <span th:text="${member.username}"></span>

                <div class="actions">
                    <!-- Demote -->
                    <form method="post" th:action="@{/communities/{communityId}/demote(communityId=${communityId})}">
                        <input type="hidden" name="targetUserId" th:value="${member.userId}">
                        <button>Demote</button>
                    </form>

                    <!-- Transfer ownership -->
                    <form method="post" th:action="@{/communities/{communityId}/transfer(communityId=${communityId})}">
                        <input type="hidden" name="targetUserId" th:value="${member.userId}">
                        <button>Transfer</button>
                    </form>
                </div>

            </div>

        </div>

    </div>

    <!-- OWNER -->

    <div class="section" th:if="${members != null}">

        <h3>Owner</h3>

        <div class="scroll-box">

            <div class="member-row"
                 th:each="member : ${members}"
                 th:if="${member.roleType.toString() == 'OWNER'}">

                <span th:text="${member.username}"></span>

                <span>(Owner)</span>

            </div>

        </div>

    </div>


</div>

</body>
</html>
