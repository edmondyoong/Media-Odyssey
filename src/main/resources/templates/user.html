<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8"> 
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media Odyssey-Users's database</title>
        <link rel="stylesheet" th:href="@{/css/homePage.css}">
    </head>
    <body>

        <!--header (display logo[sidebar toggle], homeReturn icon, search bar, user's name and avatar)-->
        <div th:replace="fragments/header :: header"></div>

        <!-- A side bar that contains features (can be discussed). Side bar can be folded -->
        <div th:replace="fragments/sidebar :: sideBar"></div>

        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
            </tr>

            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
            </tr>
        </table>

        <script th:src="@{/js/homePage.js}"></script>
    </body>
</html>
