<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Odyssey - Community Favourites</title>
    <link rel="stylesheet" th:href="@{/layout/css/homePage.css}" />

    <style>
      /* Added for current iteration:
         show star-based rating indicator in Top 10 cards
         while keeping the rest of the page structure mostly unchanged. */
      .display-rating {
        margin-top: 8px;
      }

      .display-rating .stars {
        font-size: 1.1rem;
        letter-spacing: 2px;
        line-height: 1;
      }

      .display-rating .filled {
        color: #f5b301;
      }

      .display-rating .empty {
        color: #cfcfcf;
      }

      .display-rating .rating-text {
        display: inline-block;
        margin-left: 6px;
        font-size: 0.9rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <!-- Header: logo, home button, search bar, avatar -->
    <div th:replace="boardsLayout/fragments/header :: header"></div>

    <!-- Sidebar: navigation links -->
    <!-- A side bar that contains features (can be discussed). Side bar can be folded
        Please use the MO logo to work with side bar if needed -->
    <div th:replace="boardsLayout/fragments/sidebar :: sideBar"></div>

    <main class="main-content">
      <h1>Community Favourites</h1>

      <!-- ── Category Tabs ──────────────────────────────────────────── -->
      <!--
                Server-side filter: reloads with ?category= param.
                Tab values match UserInteraction mediaType: MOVIE, GAME, SONG.
            -->
      <div class="tab-container">
        <a href="/community">
          <button
            class="tab-btn"
            th:classappend="${currentCat == null} ? 'active'"
          >
            All
          </button>
        </a>
        <a href="/community?category=MOVIE">
          <button
            class="tab-btn"
            th:classappend="${currentCat == 'MOVIE'} ? 'active'"
          >
            Movies
          </button>
        </a>
        <a href="/community?category=GAME">
          <button
            class="tab-btn"
            th:classappend="${currentCat == 'GAME'} ? 'active'"
          >
            Games
          </button>
        </a>
        <a href="/community?category=SONG">
          <button
            class="tab-btn"
            th:classappend="${currentCat == 'SONG'} ? 'active'"
          >
            Songs
          </button>
        </a>
      </div>

      <!-- Live search bar -->
      <div>
        <input
          id="localSearch"
          type="text"
          placeholder="Search titles..."
          autocomplete="off"
        />
      </div>

      <hr />

      <!-- ── Fast-Rising Top 5 ───────────────────────────────────────── -->
      <!--
                Top 5 most-liked items in the past 7 days.
                Data comes from UserInteraction table via MediaRankingService.

                TODO (later iteration):
                Revisit this section after the weekly comparison / fast-rising logic
                is finalized. For now, keep this section mostly unchanged.
            -->
      <section class="trending-section">
        <h2>🔥 Fast-Rising This Week (Top 5)</h2>

        <div th:if="${#lists.isEmpty(trending)}">
          <p>
            No trending data yet — start interacting with media on the home
            page!
          </p>
        </div>

        <div id="trendingGrid" th:unless="${#lists.isEmpty(trending)}">
          <div
            th:each="m : ${trending}"
            class="media-card trending-card"
            th:attr="data-title=${m.title}, data-type=${m.mediaType}"
          >
            <!-- Thumbnail image -->
            <img
              th:if="${m.imageUrl != null and !m.imageUrl.isEmpty()}"
              th:src="${m.imageUrl}"
              th:alt="${m.title}"
              class="media-thumbnail"
              onerror="this.style.display = 'none'"
            />

            <div class="card-title">
              <strong th:text="${m.title}">Title</strong>
              <!-- Artist name for songs -->
              <span
                th:if="${m.artist != null and !m.artist.isEmpty()}"
                th:text="'by ' + ${m.artist}"
                class="artist-name"
              ></span>
              <em th:text="'[' + ${m.mediaType} + ']'">[Type]</em>
            </div>

            <div class="card-stats">
              <span
                >🔥 <span th:text="${m.weeklyLikes}">0</span> likes this
                week</span
              >
              <span>Score: <span th:text="${m.totalScore}">0</span></span>
            </div>
          </div>
        </div>
      </section>

      <hr />

      <!-- ── Top 10 Ranked ──────────────────────────────────────────── -->
      <!--
                Ranked by Point System: LIKE × 10 + VIEW × 1.
                Aggregated from UserInteraction table via MediaRankingService.
                data-title used by JS live search filter.

                Current iteration:
                - keep internal score for sorting
                - show star-based rating indicator in UI instead of raw score
                - do not show like button on the card UI

                TODO (later iteration):
                - bring back interactive like / rating UI if needed
                - connect optimistic UI updates once interaction display rules are finalized
            -->
      <section class="ranking-section">
        <h2>🏆 Top 10 Ranked</h2>

        <div th:if="${#lists.isEmpty(mediaList)}">
          <p>
            No rankings yet — start interacting with media on the home page!
          </p>
        </div>

        <div id="top10Grid" th:unless="${#lists.isEmpty(mediaList)}">
          <div
            th:each="m, stat : ${mediaList}"
            class="media-card"
            th:attr="data-api-id=${m.mediaApiId}, data-type=${m.mediaType}, data-title=${m.title}"
          >
            <!-- Rank number + thumbnail -->
            <span class="rank-number" th:text="${stat.index + 1}">1</span>

            <img
              th:if="${m.imageUrl != null and !m.imageUrl.isEmpty()}"
              th:src="${m.imageUrl}"
              th:alt="${m.title}"
              class="media-thumbnail"
              onerror="this.style.display = 'none'"
            />

            <!-- Title + artist + type -->
            <div class="card-title">
              <strong th:text="${m.title}">Title</strong>
              <span
                th:if="${m.artist != null and !m.artist.isEmpty()}"
                th:text="'by ' + ${m.artist}"
                class="artist-name"
              ></span>
              <em th:text="'[' + ${m.mediaType} + ']'">[Type]</em>
            </div>

            <!-- Added: read-only star rating display derived from backend score -->
            <!-- Requires m.displayRating from RankedMediaResponse / MediaRankingService -->
            <div
              class="display-rating"
              th:with="rounded=${T(java.lang.Math).round(m.displayRating)}"
            >
              <div class="stars">
                <span th:classappend="${rounded >= 1} ? 'filled' : 'empty'">★</span>
                <span th:classappend="${rounded >= 2} ? 'filled' : 'empty'">★</span>
                <span th:classappend="${rounded >= 3} ? 'filled' : 'empty'">★</span>
                <span th:classappend="${rounded >= 4} ? 'filled' : 'empty'">★</span>
                <span th:classappend="${rounded >= 5} ? 'filled' : 'empty'">★</span>
                <span class="rating-text" th:text="${m.displayRating} + ' / 5'">4.0 / 5</span>
              </div>
            </div>

            <!--
              Previous current-iteration UI removed intentionally:
              raw score is still used internally for ranking,
              but is no longer shown directly to the user.
            -->
            <!--
            <div class="card-stats">
              <span
                >Score:
                <span class="score-val" th:text="${m.totalScore}">0</span></span
              >
            </div>
            -->

            <!--
              Like button hidden for this iteration.
              Endpoint can remain in backend because ranking still uses likes internally.
            -->
            <!--
            <button
              class="like-btn"
              th:attr="data-api-id=${m.mediaApiId}, data-type=${m.mediaType}"
            >
              ❤️ Like
            </button>
            -->
          </div>
        </div>
      </section>
    </main>

    <!-- ── JavaScript ──────────────────────────────────────────────────── -->
    <script>
      // ── Live search (client-side, no reload) ─────────────────────────
      // Auto view on page load
      document
        .querySelectorAll("#top10Grid > div[data-api-id]")
        .forEach((card) => {
          const mediaApiId = card.dataset.apiId;
          const mediaType = card.dataset.type;
          fetch(
            `/community/view/${mediaApiId}?mediaType=${encodeURIComponent(mediaType)}`,
            { method: "POST" },
          ).catch(() => {});
        });

      document
        .getElementById("localSearch")
        .addEventListener("input", function (e) {
          const query = e.target.value.trim().toLowerCase();
          document.querySelectorAll("#top10Grid > div").forEach((card) => {
            const title = (card.dataset.title || "").toLowerCase();
            card.style.display = !query || title.includes(query) ? "" : "none";
          });
        });

      // ── Like button ───────────────────────────────────────────────────
      /*
       * Records a LIKE interaction via POST /community/like/{mediaApiId}.
       * Session-based: server prevents duplicate likes.
       * The actual ranking update happens asynchronously as UserInteraction
       * data accumulates — page refresh will reflect updated rankings.
       *
       * TODO (later iteration):
       * If the team decides to bring back visible like buttons in the UI,
       * this handler can be used again without major changes.
       */
      document.querySelectorAll(".like-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.disabled) return;
          btn.disabled = true;

          const mediaApiId = btn.dataset.apiId;
          const mediaType = btn.dataset.type;
          fetch(
            `/community/like/${mediaApiId}?mediaType=${encodeURIComponent(mediaType)}`,
            { method: "POST" },
          )
            .then((r) => r.json())
            .then((data) => {
              if (data.liked) {
                btn.textContent = "❤️ Liked!";
              } else {
                btn.textContent = "✓ Already Liked";
              }
            })
            .catch(() => {
              btn.disabled = false;
            });
        });
      });
    </script>

    <!-- Sidebar toggle script -->
    <script th:src="@{/layout/js/homePage.js}"></script>
  </body>
</html>
