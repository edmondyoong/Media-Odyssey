<!DOCTYPE html>
<html lang="en"> 
    <head>
        <meta charset="UTF-8"> 
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Movie's name</title>
        <link rel="stylesheet" th:href="@{/layout/css/homePage.css}">
    </head>
    <body>
        <!--This html will show when user click on any movies. A webpage that shows ....-->
        
       <!--header (display logo[sidebar toggle], homeReturn icon, search bar, user's name and avatar)-->
        <div th:replace="boardsLayout/fragments/header :: header"></div>

        <!-- A side bar that contains features (can be discussed). Side bar can be folded
         Please use the MO logo to work with side bar if needed -->
        <div th:replace="boardsLayout/fragments/sidebar :: sideBar"></div>

        <!-- main content of the page begins here -->
        <main class="movie-container">
            <!-- Top Section: Poster + Info -->
            <div class="movie-header">
                <!-- Poster Card -->
                <div class="poster-card">
                    <img src="" alt="Movie Poster" id="poster-img">
                </div>

                <!-- Movie's Info -->
                <div class="movie-info">
                    <h1 class="movie-title">MOVIE TITLE</h1>

                    <!-- Recheck this element in css -->
                    <div class="movie-genres">
                        <span class="genre-tag">Science Fiction</span>
                        <span class="genre-tag">Adventure</span>
                        <span class="genre-tag">Drama</span>
                    </div>

                    <!-- Meta info (released date and the movie's length)-->
                    <div class="meta-info">
                        <div class="meta-item">
                            <span>Released date</span>
                        </div>

                        <div class="meta-item">
                            <span>movie's length</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- middle(body) shows movie's overview and interactive actions (ratings, added to board)-->
            <div class="movie-middle">
                <!--Overview-->
                <div class="movie-overview">
                    <p></p>
                </div>

                <!-- Interact/ Actions Space -->
                 <div class="actions-panel">

                    <!-- For star rating (1-5) -->
                    <div class="rating-section">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>

                    <!-- Like & Have Watched Icons (likes can be removed) -->
                    <div class="action-icons">

                        <div class="action-icon" id="like-btn" title="Like">
                        </div>

                        <div class="action-icon" id="watched-btn" title="Mark as Watched">
                            <img src="" alt="Watched" id="watched-icon">
                            <!-- Default SVG fallback -->
                        </div>

                        <!-- Theme boards drop down 
                         Description: this drop down box will allow users to add movies into their 
                         own created theme boards.
                         Note: They cannot add movies into other's theme boards. 
                         Future idea: Perhaps users can clone other users's theme boards? Or request the 
                         theme board owner to add this movie in their theme board.-->
                        <div class="themeBoard-Dropdown">
                            <button class="dropdownBtn" id="dropdownBtn">
                                <span>Add to board</span>
                            </button>

                            <!-- Show user's created board(s) -->
                            <div class="dropdown-menu">
                                <div class="dropdown-item"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Movie page's footer: show the streaming platforms that the movie is on -->
             <div class="movie-footer">
                <div class="stream-platforms-section">
                    <h3>Available on</h3>

                    <!--the div below will show the platforms that the movie is on-->
                    <div class="platforms"></div>
                </div>
             </div>
        </main>

        <script th:src="@{/layout/js/homePage.js}"></script>
    </body>
</html>
