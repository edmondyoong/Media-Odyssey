<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8"> 
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media Odyssey-Home</title>
        <link rel="stylesheet" th:href="@{/layout/css/homePage.css}">
        <link rel="stylesheet" th:href="@{/layout/css/fragments.css}">
    </head>
    <body>
        <!--header (display logo[sidebar toggle], homeReturn icon, search bar, user's name and avatar)-->
        <div th:replace="boardsLayout/fragments/header :: header"></div>

        <!-- A side bar that contains features (can be discussed). Side bar can be folded
        Please use the MO logo to work with side bar if needed -->
        <div th:replace="boardsLayout/fragments/sidebar :: sideBar"></div>
        
        <!-- User side (to be implemented)-->

        <!-- This div contains the display of boards user have joined and recommendations boards -->
        <div id="mainContent" class="main-content">

            <!--Leave for display trending music, song, movies-->
            <div></div>

            <!-- Display the boards users have created + joined -->
            <div id="personalBoardsContainer" class="personal-boards-container">

                <h3 id="personalBoardTitle" class="personal-boards-title">
                Journeys you've joined:
                </h3>

                <!-- Create board element-->
                <div>
                    <a th:href="@{boards/create}" class="board create-board">+</a>
                </div>

                <!-- Already joined boards will be shown here (for now, only creaeted boards) -->
                <a th:href="@{boards/display/{id}(id=${board.id})}" th:each="board : ${boards}" class="board-card">
                    <h3 th:text="${board.board_name}" class="personal-boards-titles"></h3>
                    <p th:text="${board.board_type}" class="board-type-label"></p>
                </a>

            </div>

            <!-- Recommendations Section -->
            <div id="recommendationsSection" class="recommendations-section">
                <h3 class="personal-boards-title">Recommended For You:</h3>

                <!-- Media type tabs -->
                <div class="rec-tabs">
                    <button class="rec-tab active" data-type="MOVIE">🎬 Movies</button>
                    <button class="rec-tab" data-type="GAME">🎮 Games</button>
                    <button class="rec-tab" data-type="SONG">🎵 Songs</button>
                </div>

                <div th:if="${errorMessage}">
                    <script th:inline="javascript">
                        alert([[${errorMessage}]]);
                    </script>
                </div>

                <!-- Status message (loading / no data yet) -->
                <p id="recStatus" class="rec-status"></p>

                <!-- Cards render here -->
                <div id="recCards" class="rec-cards"></div>
            </div>
        </div>

        <!-- ADMINS ALLOWANCE TO VIEW USERS DATABASE -->
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/users}" class="admin-btn">
                View Users Database
            </a>
        </div> 

        <script th:src="@{/layout/js/homePage.js}"></script>
        <script th:src="@{/layout/js/fragments.js}"></script>
    </body>
</html>
