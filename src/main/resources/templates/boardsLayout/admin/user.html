<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Odyssey-Users's database</title>
    <!-- this css path is to ensure the header of the page -->
    <link rel="stylesheet" th:href="@{/layout/css/global.css}">
    <link rel="stylesheet" th:href="@{/layout/css/fragments.css}">
    <style>
        /* Styles specific to User's database page. */
        main {
            margin-top: 100px;
        }

        table,
        th,
        td {
            border: 1px solid white;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>

<body>

    <!--header (display logo[sidebar toggle], homeReturn icon, search bar, user's name and avatar)-->
    <div th:replace="~{boardsLayout/fragments/header :: header}"></div>

    <!-- A side bar that contains features (can be discussed). Side bar can be folded 
        Please use the MO logo to work with side bar if needed -->
    <div th:replace="~{boardsLayout/fragments/sidebar :: sideBar}"></div>

    <main>
        <table>
            <tr>
                <th>ID</th>
                <th>Role</th>
                <th>Username</th>
                <th>Email</th>
            </tr>

            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.role}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
            </tr>
        </table>
    </main>
    <!-- this js path is to ensure the sidebar of the page works -->
    <script th:src="@{/layout/js/fragments.js}"></script>
</body>

</html>
