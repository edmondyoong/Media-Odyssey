<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8"> 
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media Odyssey-Home</title>
        <link rel="stylesheet" th:href="@{/layout/css/global.css}">
        <link rel="stylesheet" th:href="@{/layout/css/fragments.css}">
        <link rel="stylesheet" th:href="@{/layout/css/userProfile.css}">
    </head>
    <body>
        <!--header (display logo[sidebar toggle], homeReturn icon, search bar, user's name and avatar)-->
        <div th:replace="boardsLayout/fragments/header :: header"></div>

        <!-- A side bar that contains features (can be discussed). Side bar can be folded
        Please use the MO logo to work with side bar if needed -->
        <div th:replace="boardsLayout/fragments/sidebar :: sideBar"></div>

        <!--
        * This html is activated when users click on avatar picture, then choose profile.
        ** userProfile.html currently will show user's: 
        *   + avatar  +username  +description  +gender  +boards user created  +boards user've joined 
        -->

        <!-- MAIN CONTENT STARTS HERE -->
        <main class="user-profile-container">
            <div class="profile-header">

                <!-- Avatar is displayed on the right side as a circle, 
                allows user to upload their own profile picture.
                For new users (who haven't uploaded a profile picture yet) just displayed default avatar.
                * This container will always display user's avatar. It will also has a box to contains avatars
                ** (uploaded avatar + default avatar) [ONLY ONE UPLOADED AVATAR]
                -->
                <div class="avatar-container">

                    <!--Display avatar on webpage-->
                    <img th:src="${user.selected_avatar_type == 'custom' 
                    ? user.custom_avatar_URL : user.default_avatar_URL}" alt="Avatar" class="avatar-display">

                    <!-- The avatar selection box (that stores avatars) -->

                    <div class="avatars-box hidden" id="avatarsBox">

                        <!-- For the custom avatar -->
                        <img th:if="${user.custom_avatar_URL != null}" 
                        th:src="${user.custom_avatar_URL}" alt="Custom Avatar" 
                        class="avatar-option" data-avatar-type="custom">

                        <!-- This element will allow user to upload image files.
                        ** Design choice: It is determined that this element should always be presented even
                        * after the user has uploaded anything. So both custom + default will be displayed. 
                        * And this plus button will also be there, for simple & easy to understand design. 
                        *
                        *** Logic: we will only accpet: .png, .jpg, .jpeg, .svg files as uploaded avatar. 
                        -->
                        <form action="post" enctype="multipart/form-data">
                            <div class="upload-avatar-box">
                                <label for="fileUpload" class="avatar-placeholder">
                                    <span class="plus-icon">+</span>
                                </label>

                                <input type="file" id="fileUpload" 
                                    name="file" accept=".png, .jpg, .jpeg, .svg" style="display: none;">
                            </div>
                        </form> 

                        <!-- For the default avatar -->
                        <img th:src="${user.default_avatar_URL}" alt="Default Avatar" 
                        class="avatar-option" data-avatar-type="default">
                    </div>

                </div>

                <!-- Displayed user's info (input elements can be left empty)-->
                <div class="user-info-box">
                    <input type="text" placeholder="Username" class="info-items">

                    <input type="text" placeholder="description" class="info-items">

                    <input type="text" placeholder="gender" class="info-items">
                </div>
            </div>

            <div class="profile-middle">
                <div class="boards-display-box">
                    <div class="boards-created boardItem"></div>

                    <div class="boards-joined boardItem"></div>
                </div>
            </div>

            <div class="profile-footer"></div>
        </main>

        <script th:src="@{/layout/js/fragments.js}"></script>
        <script th:src="@{/layout/js/userProfile.js}"></script>
    </body>
</html>
