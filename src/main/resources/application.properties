spring.config.import=optional:file:.env[.properties]

spring.application.name=Media Odyssey
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer datasource initialization until connection is available
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Spring Session
spring.session.jdbc.initialize-schema=always
spring.session.jdbc.cleanup-cron=0 0 * * * *
server.servlet.session.timeout=60m
server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.secure=true # Breaks localhost testing because requires HTTPS

# Media API Keys
tmdb.api.key=${TMDB_API_KEY}
rawg.api.key=${RAWG_API_KEY}
spotify.client.id=${SPOTIFY_CLIENT_ID}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET}
lastfm.api.key=${LASTFM_API_KEY}
lastfm.api.secret=${LASTFM_API_SECRET}

# Object storage (Backblaze B2 S3 compatible)
storage.endpoint=${STORAGE_ENDPOINT:}
storage.access-key=${STORAGE_ACCESS_KEY:}
storage.secret-key=${STORAGE_SECRET_KEY:}
storage.bucket=${STORAGE_BUCKET:}
storage.public-url=${STORAGE_PUBLIC_URL:}
storage.region=${STORAGE_REGION:}

# Email
email.from=${EMAIL_FROM:}
email.verifytoken.expiry-in-minutes=${VERIFY_TOKEN_EXPIRY_IN_MINUTES:60}
resend.api.key=${RESEND_API_KEY:}

# Development mode
dev.mode.enabled=${DEV_MODE:FALSE}
dev.email.suffix=${DEV_EMAIL_SUFFIX:}