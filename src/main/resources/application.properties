spring.config.import=optional:file:.env[.properties]

spring.application.name=mediaodyssey
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer datasource initialization until connection is available
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Spring Session
spring.session.jdbc.initialize-schema=always
spring.session.jdbc.cleanup-cron=0 0 * * * *
server.servlet.session.timeout=60m
server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.secure=true # Breaks localhost testing because requires HTTPS

# API Keys
tmdb.api.key=${TMDB_API_KEY}
rawg.api.key=${RAWG_API_KEY}
spotify.client.id=${SPOTIFY_CLIENT_ID}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET}